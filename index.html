<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identidad Digital | Etéreo Lab</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* VARIABLES CSS (La magia del Dark/Light Mode) */
        :root {
            /* Modo Oscuro (Por defecto) */
            --bg-deep: #010a18;
            --bg-light: #0a162b;
            --accent: #e6dfd1;
            --text-main: #ffffff;
            --text-sub: #8b9bb4;
            --success: #1DB954;
            --glass-bg: rgba(10, 22, 43, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --orb-1: #102a52;
            --orb-2: #1c3d6e;
        }

        /* Variables para el Modo Claro */
        body.light-mode {
            --bg-deep: #f4f1ea; /* Crema suave */
            --bg-light: #e6dfd1; /* Acento original como fondo secundario */
            --accent: #011129; /* Azul corporativo original como acento */
            --text-main: #011129;
            --text-sub: #4a5568;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(1, 17, 41, 0.1);
            --shadow-color: rgba(1, 17, 41, 0.1);
            --orb-1: #e2d8c3;
            --orb-2: #d1c5ab;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow-x: hidden; 
            position: relative;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        /* Animación de Fondo Continua */
        .background-orbs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 20s infinite ease-in-out alternate; transition: background 0.5s ease; }
        .orb-1 { width: 300px; height: 300px; background: var(--orb-1); top: -50px; left: -100px; }
        .orb-2 { width: 250px; height: 250px; background: var(--orb-2); bottom: -50px; right: -50px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
        
        .container { width: 100%; max-width: 480px; padding: 30px 20px 50px 20px; display: none; flex-direction: column; align-items: center; }
        
        /* Sistema de Animaciones en Cascada (Restaurado y Mejorado) */
        .fade-up { opacity: 0; transform: translateY(30px); }
        .visible .fade-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.1s; } 
        .delay-2 { animation-delay: 0.2s; } 
        .delay-3 { animation-delay: 0.3s; } 
        .delay-4 { animation-delay: 0.4s; }
        
        /* Cabecera y Controles */
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand { font-size: 13px; font-weight: 800; letter-spacing: 4px; color: var(--accent); opacity: 0.8; transition: color 0.3s; }
        .controls { display: flex; gap: 10px; }
        .icon-btn { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--accent); 
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s; 
        }
        .icon-btn:active { transform: scale(0.9); }

        /* Efecto Radar NFC y Foto */
        .profile-pic-container { position: relative; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; width: 180px; height: 180px;}
        .radar-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); opacity: 0; z-index: -2; animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }
        .profile-pic { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-deep); background-color: var(--bg-light); z-index: 1; transition: border-color 0.5s; box-shadow: 0 10px 25px var(--shadow-color); }
        
        h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 5px; color: var(--text-main); transition: color 0.5s;}
        .subtitle { font-size: 16px; color: var(--accent); font-weight: 400; margin-bottom: 30px; text-align: center; opacity: 0.9; transition: color 0.5s;}
        
        /* Botones de Acción Interactivos */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-bottom: 15px; }
        .btn { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn-primary { background-color: var(--success); color: #000; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3); animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(29, 185, 84, 0); } 100% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0); } }
        .btn-secondary { background-color: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        
        .btn-location { background: transparent; color: var(--text-main); border: 2px dashed var(--glass-border); width: 100%; margin-bottom: 30px; transition: all 0.3s; }
        .btn-location:hover { border-color: var(--accent); background: rgba(230, 223, 209, 0.05); }
        .btn:active { transform: scale(0.96); }
        
        /* Tarjetas con Efecto Hover Float */
        .card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; width: 100%; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px var(--shadow-color); transition: transform 0.3s ease, background 0.5s ease, border-color 0.5s ease; }
        .card:hover { transform: translateY(-3px); }
        .card-alert { background: rgba(255, 75, 75, 0.1); border: 1px solid rgba(255, 75, 75, 0.3); }
        .card h3 { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; transition: color 0.5s; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); transition: border-color 0.5s; }
        .data-row:last-child { border-bottom: none; padding-bottom: 0; }
        .label { color: var(--text-sub); font-size: 14px; font-weight: 400; transition: color 0.5s;}
        .value { color: var(--text-main); font-size: 15px; font-weight: 600; text-align: right; transition: color 0.5s;}
        .link-maps { color: #4da6ff; text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        body.light-mode .link-maps { color: #0056b3; } /* Enlace más oscuro para modo claro */
        
        /* Spinner Premium */
        .loader-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin-loader 1s linear infinite; }
        @keyframes spin-loader { to { transform: rotate(360deg); } }

        /* Toast Notificación */
        #toast { visibility: hidden; min-width: 200px; background-color: var(--success); color: #000; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; font-weight: bold; font-size: 14px; transform: translateX(-50%); opacity: 0; transition: opacity 0.5s, bottom 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>
    <div class="background-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    
    <div id="pantalla-carga" class="loader-container">
        <div class="spinner"></div>
        <div style="color: var(--text-sub); font-size: 14px; letter-spacing: 1px;">Sincronizando...</div>
    </div>

    <div id="perfil-mascota" class="container">
        
        <div class="top-bar fade-up">
            <div class="brand">ETÉREO LAB</div>
            <div class="controls">
                <button class="icon-btn" onclick="toggleTheme()" aria-label="Cambiar Tema">
                    <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button class="icon-btn" onclick="compartirPerfil()" aria-label="Compartir Perfil">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                </button>
            </div>
        </div>

        <div class="profile-pic-container fade-up delay-1">
            <div class="radar-pulse"></div>
            <img id="foto" class="profile-pic" src="">
        </div>
        
        <h1 id="nombre" class="fade-up delay-1">...</h1>
        <div id="raza" class="subtitle fade-up delay-1">...</div>

        <div class="action-grid fade-up delay-2">
            <a id="btn-llamar" href="#" class="btn btn-primary">📞 Llamar Dueño</a>
            <a id="btn-wa" href="#" class="btn btn-secondary">💬 WhatsApp</a>
        </div>
        
        <button id="btn-gps" class="btn btn-location fade-up delay-2" onclick="enviarUbicacion()">📍 Enviar mi ubicación al dueño</button>

        <div id="tarjeta-medica" class="card card-alert fade-up delay-3" style="display: none;">
            <h3 style="color: #ff4b4b;">⚕️ Alertas Médicas</h3>
            <p id="condiciones" style="color: var(--text-main); font-size: 15px; line-height: 1.6; font-weight: bold;"></p>
        </div>

        <div class="card fade-up delay-3">
            <h3>📋 Biometría</h3>
            <div class="data-row"><span class="label">Sexo</span><span id="sexo" class="value">-</span></div>
            <div class="data-row"><span class="label">Nacimiento</span><span id="nacimiento" class="value">-</span></div>
            <div class="data-row"><span class="label">Microchip</span><span id="microchip" class="value">-</span></div>
        </div>

        <div id="tarjeta-vet" class="card fade-up delay-3" style="display: none;">
            <h3>🏥 Veterinaria</h3>
            <div class="data-row"><span class="label">Doctor/Clínica</span><span id="vet-nombre" class="value">-</span></div>
            <div class="data-row"><span class="label">Teléfono</span><span id="vet-tel" class="value">-</span></div>
        </div>

        <div class="card fade-up delay-4">
            <h3>🛡️ Red de Rescate</h3>
            <div class="data-row"><span class="label">Propietario</span><span id="dueno" class="value">-</span></div>
            <div class="data-row"><span class="label">Tel. Principal</span><span id="tel1" class="value">-</span></div>
            <div class="data-row"><span class="label">Emergencia</span><span id="tel2" class="value">-</span></div>
            <div class="data-row"><span class="label">Zona</span><span id="direccion" class="value">-</span></div>
        </div>
        
        <div style="text-align: center; margin-top: 10px; margin-bottom: 20px;" class="fade-up delay-4">
            <span style="font-size: 11px; color: var(--text-sub); opacity: 0.5;">POWERED BY ETÉREO LAB STUDIO</span>
        </div>
    </div>

    <div id="toast">Enlace copiado al portapapeles</div>

    <script>
        // --- SISTEMA DE TEMA CLARO/OSCURO ---
        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            
            if (isLight) {
                // Icono de Luna
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                localStorage.setItem('theme', 'light');
            } else {
                // Icono de Sol
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Cargar preferencia guardada del usuario
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }

        const parametros = new URLSearchParams(window.location.search);
        const idMascota = parametros.get('id');
        let telefonoDueñoGlobal = '';
        let nombreMascotaGlobal = '';

        if (!idMascota) {
            document.getElementById('pantalla-carga').innerHTML = '<div style="text-align:center; color:var(--text-sub);"><h2>⚠️ Placa Inactiva</h2><p>Escanea un código oficial de Etéreo.</p></div>';
        } else {
            fetch('base_datos.json?nocache=' + new Date().getTime())
                .then(r => r.json())
                .then(datos => {
                    if (datos[idMascota]) {
                        const m = datos[idMascota];
                        nombreMascotaGlobal = m.nombre;
                        
                        document.title = `${m.nombre} | Etéreo ID`;
                        document.getElementById('nombre').innerText = m.nombre;
                        document.getElementById('raza').innerText = m.apellidos ? `${m.apellidos} • ${m.especie_raza || 'Mascota'}` : (m.especie_raza || 'Mascota');
                        if(m.foto) document.getElementById('foto').src = `fotos/${m.foto}?v=${new Date().getTime()}`;

                        telefonoDueñoGlobal = m.contacto_principal.telefono.replace(/[^0-9+]/g, '');
                        document.getElementById('btn-llamar').href = `tel:${telefonoDueñoGlobal}`;
                        document.getElementById('btn-wa').href = `https://wa.me/${telefonoDueñoGlobal.replace('+','')}?text=¡Hola!%20Escaneé%20la%20placa%20de%20${m.nombre}%20y%20lo%20tengo%20conmigo.`;

                        if(m.condiciones_medicas) {
                            document.getElementById('tarjeta-medica').style.display = 'block';
                            document.getElementById('condiciones').innerText = m.condiciones_medicas;
                        }

                        if(m.veterinario && (m.veterinario.nombre || m.veterinario.telefono)) {
                            document.getElementById('tarjeta-vet').style.display = 'block';
                            document.getElementById('vet-nombre').innerText = m.veterinario.nombre || '-';
                            if(m.veterinario.telefono) {
                                document.getElementById('vet-tel').innerHTML = `<a href="tel:${m.veterinario.telefono.replace(/[^0-9+]/g, '')}" class="link-maps">📞 Llamar Clínica</a>`;
                            }
                        }

                        document.getElementById('sexo').innerText = m.sexo || '-';
                        document.getElementById('nacimiento').innerText = m.fecha_nacimiento || '-';
                        document.getElementById('microchip').innerText = m.microchip || '-';
                        document.getElementById('dueno').innerText = m.contacto_principal.nombre || '-';
                        document.getElementById('tel1').innerText = m.contacto_principal.telefono || '-';
                        document.getElementById('tel2').innerText = m.contacto_emergencia.telefono || '-';
                        
                        // EL FIX DEFINITIVO DE GOOGLE MAPS PARA LA DIRECCIÓN
                        if(m.direccion_opcional) {
                            const dirCodificada = encodeURIComponent(m.direccion_opcional);
                            const linkGoogleMaps = `https://www.google.com/maps/search/?api=1&query=${dirCodificada}`;
                            document.getElementById('direccion').innerHTML = `<a href="${linkGoogleMaps}" target="_blank" class="link-maps">🗺️ Ver Mapa</a>`;
                        }

                        // Desaparecer carga y disparar animaciones
                        setTimeout(() => {
                            document.getElementById('pantalla-carga').style.display = 'none';
                            const perfil = document.getElementById('perfil-mascota');
                            perfil.style.display = 'flex';
                            // El pequeño delay permite que el navegador registre el 'display: flex' antes de agregar la clase que dispara las animaciones CSS
                            setTimeout(() => perfil.classList.add('visible'), 50);
                        }, 500);
                    } else {
                        document.getElementById('pantalla-carga').innerHTML = '<div style="text-align:center; color:var(--text-sub);"><h2>🔍 ID No Encontrado</h2><p>El perfil no existe.</p></div>';
                    }
                })
                .catch(e => {
                    document.getElementById('pantalla-carga').innerHTML = '<div style="text-align:center; color:var(--text-sub);"><h2>❌ Error de Red</h2></div>';
                });
        }

        // EL FIX DEFINITIVO DE GOOGLE MAPS PARA EL GPS DEL RESCATISTA
        function enviarUbicacion() {
            const btn = document.getElementById('btn-gps');
            const textoOriginal = btn.innerHTML;
            btn.innerText = "⏳ Obteniendo GPS...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (posicion) => {
                        const lat = posicion.coords.latitude;
                        const lon = posicion.coords.longitude;
                        // API Oficial de Google Maps para coordenadas
                        const linkMaps = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                        const mensaje = `¡URGENTE! Tengo a ${nombreMascotaGlobal}. Estoy exactamente aquí: ${linkMaps}`;
                        
                        btn.innerHTML = textoOriginal;
                        window.open(`https://wa.me/${telefonoDueñoGlobal.replace('+','')}?text=${encodeURIComponent(mensaje)}`, '_blank');
                    },
                    (error) => { 
                        alert("Por favor, permite el acceso a tu ubicación en tu celular para enviar esta alerta."); 
                        btn.innerHTML = textoOriginal; 
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                alert("Tu navegador no soporta geolocalización.");
                btn.innerHTML = textoOriginal;
            }
        }

        function compartirPerfil() {
            if (navigator.share) {
                navigator.share({
                    title: `Identidad de ${nombreMascotaGlobal}`,
                    text: `Mira el expediente digital de ${nombreMascotaGlobal} protegido por Etéreo Lab Studio.`,
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    const toast = document.getElementById("toast");
                    toast.className = "show";
                    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
                });
            }
        }
    </script>
</body>
</html>
